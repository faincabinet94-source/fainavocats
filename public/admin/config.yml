backend:
  name: github
  repo: faincabinet94-source/fainavocats
  branch: main

locale: "fr"

media_folder: "public/images/blog"
public_folder: "/images/blog"

collections:
  - name: "blog"
    label: "Articles"
    folder: "content/blog"
    create: true
    extension: "mdx"
    format: "frontmatter"
    slug: "{{slug}}"
    fields:
      - { label: "Titre", name: "title", widget: "string" }
      - { label: "Date de publication", name: "date", widget: "datetime", format: "YYYY-MM-DD", date_format: "DD/MM/YYYY", time_format: false }
      - { label: "Catégorie", name: "category", widget: "string", default: "Droit de la famille" }
      - { label: "Auteur", name: "author", widget: "string", default: "Joackim FAIN" }
      - { label: "Description (SEO)", name: "description", widget: "text" }
      - { label: "Image", name: "image", widget: "image", required: false }
      - { label: "URL (slug)", name: "slug", widget: "string" }
      - { label: "Contenu", name: "body", widget: "markdown" }
